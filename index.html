<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LT-ERP 簡易銷貨單</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- 登入畫面 -->
  <div id="login-view" class="view" style="display:none;">
    <div class="login-card">
      <h1>🏷️ LT-ERP 簡易銷貨單</h1>
      <p class="subtitle">總倉撿貨員 / 助理 / admin 用</p>
      <form id="login-form">
        <label for="email">帳號（email）</label>
        <input type="email" id="email" placeholder="username@lt-erp.com" required autofocus autocomplete="username" />
        <label for="password">密碼</label>
        <input type="password" id="password" required autocomplete="current-password" />
        <button type="submit" id="login-btn">登入</button>
      </form>
      <div id="login-error" class="error" style="display:none;"></div>
      <p class="footer-note">⚠️ 限 admin / assistant 帳號使用</p>
    </div>
  </div>

  <!-- 主畫面 -->
  <div id="main-view" class="view" style="display:none;">
    <header class="topbar">
      <div class="topbar-left">
        <h1>📋 簡易銷貨單</h1>
      </div>
      <div class="topbar-right">
        <span id="current-user"></span>
        <button id="logout-btn" class="btn-secondary">登出</button>
      </div>
    </header>

    <main id="main-content">
      <!-- B 段第一版：占位畫面 -->
      <div class="placeholder">
        <h2>✅ 登入成功</h2>
        <p><strong>B 段（登入機制）已通過驗收。</strong></p>
        <p>下個版本（C 段 + D 段）會加：</p>
        <ul>
          <li>📋 訂單列表 + 篩選器（今日 / 明日 / 7 天 / 30 天 / 店家 / 狀態 / 退貨狀態 / 單號搜尋）</li>
          <li>🔍 點單號 → 明細 modal</li>
          <li>📄 單張列印（A5）</li>
          <li>📄 批次列印今日 18 家</li>
        </ul>
        <p class="hint">目前可測試：登入 → 看到此畫面 → 登出 → 再登入</p>
      </div>
    </main>
  </div>

  <!-- 載入中 -->
  <div id="boot-view" class="view">
    <div class="boot">⏳ 載入中...</div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
