<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LT-ERP 簡易銷貨單</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- 登入畫面 -->
  <div id="login-view" class="view" style="display:none;">
    <div class="login-card">
      <h1>🏷️ LT-ERP 簡易銷貨單</h1>
      <p class="subtitle">總倉撿貨員 / 助理 / admin 用</p>
      <form id="login-form">
        <label for="email">帳號（email）</label>
        <input type="email" id="email" placeholder="username@lt-erp.com" required autofocus autocomplete="username" />
        <label for="password">密碼</label>
        <input type="password" id="password" required autocomplete="current-password" />
        <button type="submit" id="login-btn">登入</button>
      </form>
      <div id="login-error" class="error" style="display:none;"></div>
      <p class="footer-note">⚠️ 限 admin / assistant 帳號使用</p>
    </div>
  </div>

  <!-- 主畫面 -->
  <div id="main-view" class="view" style="display:none;">
    <header class="topbar">
      <div class="topbar-left">
        <h1>📋 簡易銷貨單</h1>
      </div>
      <div class="topbar-right">
        <span id="current-user"></span>
        <button id="logout-btn" class="btn-secondary">登出</button>
      </div>
    </header>

    <main id="main-content">

      <!-- 篩選 bar -->
      <section class="filter-bar">
        <div class="quick-buttons">
          <button type="button" data-quick="today">今日</button>
          <button type="button" data-quick="tomorrow">明日</button>
          <button type="button" data-quick="7days">近 7 天</button>
          <button type="button" data-quick="30days">近 30 天</button>
        </div>
        <div class="filter-row">
          <span class="filter-group">
            <label>日期區間（出貨日）</label>
            <span class="date-range">
              <input type="date" id="filter-from">
              <span class="dash">~</span>
              <input type="date" id="filter-to">
            </span>
          </span>
          <span class="filter-group">
            <label>店家</label>
            <select id="filter-store"><option value="">全部</option></select>
          </span>
          <span class="filter-group">
            <label>狀態</label>
            <select id="filter-status">
              <option value="">全部（不含暫存）</option>
              <option value="暫存">📝 暫存（僅看暫存）</option>
              <option value="待處理">待處理</option>
              <option value="已建單">已建單</option>
              <option value="已收到">已收到</option>
              <option value="有問題">有問題</option>
            </select>
          </span>
          <span class="filter-group">
            <label>退貨</label>
            <select id="filter-return">
              <option value="">全部</option>
              <option value="無">無</option>
              <option value="申請中">申請中</option>
              <option value="處理中">處理中</option>
              <option value="已解決">已解決</option>
            </select>
          </span>
          <span class="filter-group">
            <label>單號搜尋</label>
            <input type="text" id="filter-search" placeholder="SS-...">
          </span>
          <span class="filter-actions">
            <button type="button" id="btn-search" class="btn-primary">🔍 查詢</button>
            <button type="button" id="btn-reset" class="btn-secondary">重設</button>
          </span>
        </div>
      </section>

      <!-- 狀態列 -->
      <div id="status-bar" class="status-bar" style="display:none;"></div>

      <!-- 訂單列表 -->
      <section class="orders-card">
        <table class="orders-table">
          <thead>
            <tr>
              <th>單號</th>
              <th>店家</th>
              <th>訂單日</th>
              <th>出貨日</th>
              <th class="r">件數</th>
              <th class="r">金額</th>
              <th>狀態</th>
              <th>退貨</th>
              <th class="c">動作</th>
            </tr>
          </thead>
          <tbody id="orders-tbody">
            <tr><td colspan="9" class="empty">⏳ 載入中...</td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <!-- 明細 modal -->
  <div id="detail-modal" class="modal" style="display:none;">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modal-close-btn" type="button">✕</button>
      <div id="modal-body">
        <div class="loading">⏳ 載入中...</div>
      </div>
    </div>
  </div>

  <!-- 載入中 -->
  <div id="boot-view" class="view">
    <div class="boot">⏳ 載入中...</div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
